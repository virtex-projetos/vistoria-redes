<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Redes - Vistoria</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #ffffff; padding: 20px; color: #000000; }
        .container { max-width: 650px; background: #ffffff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: auto; border: 2px solid #000000; }
        .header { text-align: center; border-bottom: 2px solid #e53e3e; padding-bottom: 15px; margin-bottom: 20px; }
        .logo { max-width: 150px; height: auto; margin-bottom: 10px; }
        h1 { color: #e53e3e; font-size: 22px; margin: 0; }
        h3 { color: #000000; margin-top: 20px; border-left: 4px solid #e53e3e; padding-left: 10px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 14px; color: #000000; }
        input[type="number"], select { width: 100%; padding: 10px; border: 1px solid #000000; border-radius: 5px; box-sizing: border-box; background-color: #ffffff; color: #000000; }
        .checkbox-group { display: flex; align-items: center; margin-bottom: 10px; background: #f7fafc; padding: 8px; border-radius: 5px; border: 1px solid #edf2f7; }
        .checkbox-group input { margin-right: 10px; transform: scale(1.2); }
        button { width: 100%; padding: 15px; background-color: #e53e3e; color: #ffffff; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #resultado { margin-top: 25px; padding: 20px; background-color: #ffffff; border-radius: 8px; display: none; border: 2px solid #e53e3e; }
        .alerta { color: #e53e3e; font-weight: bold; margin-bottom: 8px; list-style: none; }
        .dica { color: #000000; font-weight: bold; margin-bottom: 8px; list-style: none; }
        .critico { color: #ffffff; background-color: #e53e3e; padding: 10px; border-radius: 5px; text-align: center; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://via.placeholder.com/150x50.png?text=Logo+Empresa" alt="Logo da Empresa" class="logo">
        <h1>📋 Vistoria Técnica e Dimensionamento</h1>
    </div>
    
    <div class="form-group">
        <label>Público Geral (Conexões):</label>
        <input type="number" id="publico" value="0">
    </div>
    <div class="form-group">
        <label>Staff / Administrativo:</label>
        <input type="number" id="staff" value="0">
    </div>
    <div class="form-group">
        <label>Maquininhas de Cartão:</label>
        <input type="number" id="maquininhas" value="0">
    </div>

    <div class="form-group">
        <label>Tamanho do Local / Divisórias:</label>
        <select id="tamanho_local">
            <option value="pequeno">Pequeno (Sala única, Academia compacta)</option>
            <option value="medio">Médio ou Bem Reparticionado (Várias salas/paredes)</option>
            <option value="grande">Grande Porte (Estádio, Praça, Show)</option>
        </select>
    </div>

    <div class="checkbox-group"><input type="checkbox" id="area_aberta"><label>Área Aberta (Exposto ao tempo)?</label></div>
    <div class="checkbox-group"><input type="checkbox" id="sinal_ruim_4g"><label>Sinal 4G/5G Ruim no local?</label></div>
    <div class="checkbox-group"><input type="checkbox" id="tem_live"><label>Haverá Live / Transmissão?</label></div>
    <div class="checkbox-group"><input type="checkbox" id="energia_oscila"><label>Energia instável no local?</label></div>

    <button onclick="gerarProjeto()">Calcular Projeto</button>

    <div id="resultado"></div>
</div>

<script>
    function gerarProjeto() {
        let pub = parseInt(document.getElementById('publico').value) || 0;
        let stf = parseInt(document.getElementById('staff').value) || 0;
        let maq = parseInt(document.getElementById('maquininhas').value) || 0;
        let total = pub + stf + maq;
        
        let area_aberta = document.getElementById('area_aberta').checked;
        let tamanho = document.getElementById('tamanho_local').value;
        let sinal_4g = document.getElementById('sinal_ruim_4g').checked;
        let live = document.getElementById('tem_live').checked;
        let energia = document.getElementById('energia_oscila').checked;

        let eq = []; let alertas = []; let dicas = [];
        let grande_porte = (total >= 200 || tamanho === "grande");

        // --- LÓGICA DE HARDWARE ATÉ 30 DISPOSITIVOS ---
        if (total <= 30) {
            if (tamanho === "medio") {
                eq.push("01 ONU Wi-Fi AX (Zyxel/ZTE) + 01 Roteador adicional (Devido ao local ser grande ou reparticionado)");
            } else {
                eq.push("01 ONU Wi-Fi AX (Zyxel/ZTE) ou 01 Roteador de boa performance");
            }
        } 
        // --- LÓGICA ACIMA DE 30 DISPOSITIVOS (ENTRADA DE EAPs) ---
        else {
            // Roteamento/Gerência
            if (total < 100) {
                eq.push("01 ONU Bridge + 01 Roteador para Gerência");
            } else {
                eq.push("01 ONU Bridge + 01 Mikrotik (RB 750Gr3 ou 760iGS)");
            }

            // Wi-Fi (EAPs)
            if (grande_porte) {
                let cap = area_aberta ? 120 : 100;
                let qtd = Math.max(3, Math.ceil(total / cap));
                let modelo = area_aberta ? "EAP 610 Outdoor" : "EAP 620 ou superior Indoor";
                eq.push(`${qtd}x Access Points ${modelo}`);
                alertas.push("🛑 PROJETO DE GRANDE PORTE: Requer análise de Mapa de Calor pelo Analista!");
            } else {
                if (area_aberta) {
                    let qtd = Math.max(1, Math.ceil(total / 120));
                    eq.push(`${qtd}x EAP 610 Outdoor`);
                } else {
                    if (total <= 80) eq.push("01x EAP 610 ou 650 Indoor");
                    else if (total <= 120) eq.push("01x EAP 620 Indoor");
                    else eq.push("02x EAP 620 Indoor");
                }
            }
        }

        // --- EXTRAS: ENERGIA E BACKUP ---
        if (total > 30 || energia || live) eq.push("01 Nobreak (Obrigatório para segurança do evento)");
        if (sinal_4g && total > 50) eq.push("01 Link Backup (Starlink / 2ª Fibra)");

        // --- DICAS TÉCNICAS ---
        if (live) dicas.push("Cabo de rede obrigatório para a transmissão.");
        if (maq > 0) dicas.push("Rede 2.4GHz separada SEM Hotspot para as maquininhas.");
        if (sinal_4g) alertas.push("Sinal 4G ruim: O Wi-Fi será muito exigido. Configure controle de banda.");

        let resDiv = document.getElementById('resultado');
        resDiv.innerHTML = (grande_porte ? '<div class="critico">ALTA COMPLEXIDADE / GRANDE PORTE</div>' : '') +
            '<h3>Hardware Recomendado:</h3><ul>' + eq.map(i => `<li>${i}</li>`).join('') + '</ul>' +
            (alertas.length ? '<h3>Alertas:</h3><ul>' + alertas.map(i => `<li class="alerta">${i}</li>`).join('') + '</ul>' : '') +
            (dicas.length ? '<h3>Dicas:</h3><ul>' + dicas.map(i => `<li class="dica">${i}</li>`).join('') + '</ul>' : '');
        resDiv.style.display = 'block';
    }
</script>
</body>
</html>
